<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReVax Cast Receiver</title>
  <link rel="stylesheet" href="styles.css">
  <!-- hls.js for HLS playback with custom header injection -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
</head>
<body>
  <div id="receiver">
    <!-- Media overlay: poster, title, loading spinner -->
    <div id="media-overlay">
      <img id="poster" src="" alt="" />
      <div id="media-info">
        <h1 id="media-title"></h1>
        <p id="media-subtitle"></p>
      </div>
      <div id="spinner" class="hidden">
        <div class="spinner-ring"></div>
      </div>
    </div>

    <!-- Video element for playback -->
    <video id="player" autoplay></video>

    <!-- Idle screen shown when no media is loaded -->
    <div id="idle-screen">
      <h1>ReVax</h1>
      <p>Ready to cast</p>
    </div>
  </div>

  <script src="receiver.js"></script>
</body>
</html>
