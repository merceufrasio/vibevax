name: Build iOS IPA

on:
  push:
    branches: [feature/anime-poster-module, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep -i xcode
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          echo "Available iOS SDKs:"
          xcodebuild -showsdks | grep iOS
          IOS_SDK=$(xcodebuild -showsdks | grep "iphoneos" | head -1 | awk '{print $NF}')
          echo "Will use SDK: $IOS_SDK"
          echo "IOS_SDK=$IOS_SDK" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('package-lock.json') }}
          restore-keys: pods-

      - name: Setup certificates
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          if [ -z "$P12_BASE64" ]; then echo "::error::P12_BASE64 secret is empty!"; exit 1; fi
          if [ -z "$P12_PASSWORD" ]; then echo "::error::P12_PASSWORD secret is empty!"; exit 1; fi
          if [ -z "$MOBILEPROVISION_BASE64" ]; then echo "::error::MOBILEPROVISION_BASE64 secret is empty!"; exit 1; fi
          echo "$P12_BASE64" | base64 --decode > cert.p12
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > cert.mobileprovision
          echo "P12 file size: $(wc -c < cert.p12) bytes"
          echo "Mobileprovision file size: $(wc -c < cert.mobileprovision) bytes"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i cert.mobileprovision | grep -A1 UUID | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          cp cert.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV
          echo "Certificate and profile installed successfully"

      - name: Prebuild iOS
        env:
          RCT_NEW_ARCH_ENABLED: "0"
        run: |
          rm -rf ~/Library/Caches/CocoaPods
          npx expo prebuild --platform ios --clean

      - name: Disable New Architecture in Podfile
        run: |
          cd ios
          sed -i '' 's/ENV\[.RCT_NEW_ARCH_ENABLED.\] == .1./false/g' Podfile
          sed -i '' 's/:fabric_enabled => true/:fabric_enabled => false/g' Podfile

      - name: Install CocoaPods
        env:
          RCT_NEW_ARCH_ENABLED: "0"
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Patch Folly headers
        run: |
          cd ios
          chmod -R u+w Pods/ 2>/dev/null || true
          cat > /tmp/folly_patch.py << 'PYEOF'
          import os, stat

          targets = ("Expected.h", "Optional.h", "Try.h")
          patched = []

          for root, dirs, files in os.walk("Pods"):
              for fname in files:
                  if fname in targets and "folly" in root.lower():
                      fpath = os.path.join(root, fname)
                      # Resolve symlink to get real path
                      if os.path.islink(fpath):
                          real_path = os.path.realpath(fpath)
                          with open(real_path, "r") as f:
                              content = f.read()
                          os.remove(fpath)
                      else:
                          os.chmod(fpath, stat.S_IRUSR | stat.S_IWUSR | stat.S_IRGRP | stat.S_IROTH)
                          with open(fpath, "r") as f:
                              content = f.read()

                      if "REVAX_PATCH" in content:
                          continue

                      # Remove ALL lines that include folly/coro
                      lines = content.split("\n")
                      new_lines = []
                      for line in lines:
                          if "folly/coro" in line:
                              new_lines.append("// REMOVED: " + line)
                          elif "namespace coro" in line and "folly" in line:
                              new_lines.append("// REMOVED: " + line)
                          else:
                              new_lines.append(line)

                      # Also comment out entire coro namespace blocks
                      result = "\n".join(new_lines)
                      # Add marker
                      result = "// REVAX_PATCH - folly coro removed\n" + result

                      with open(fpath, "w") as f:
                          f.write(result)
                      patched.append(fpath)

          for p in patched:
              print(f"Patched: {p}")
          print(f"Total: {len(patched)} files patched")
          PYEOF
          python3 /tmp/folly_patch.py

      - name: Build IPA
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME="ReVax"
          echo "Building $SCHEME from $WORKSPACE with SDK $IOS_SDK"
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>FWU2HH6A9H</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.spinach2659.onion7191</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/ReVax.xcarchive \
            -sdk "$IOS_SDK" \
            CODE_SIGN_STYLE=Manual \
            "PROVISIONING_PROFILE=${PROFILE_UUID}" \
            "PROVISIONING_PROFILE_SPECIFIER=" \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            DEVELOPMENT_TEAM=FWU2HH6A9H \
            "GCC_PREPROCESSOR_DEFINITIONS=FOLLY_HAS_COROUTINES=0" \
            -allowProvisioningUpdates
          xcodebuild -exportArchive \
            -archivePath build/ReVax.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ReVax-iOS
          path: ios/build/output/*.ipa
          retention-days: 30
