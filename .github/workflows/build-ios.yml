name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          IOS_SDK=$(xcodebuild -showsdks | grep "iphoneos" | head -1 | awk '{print $NF}')
          echo "IOS_SDK=$IOS_SDK" >> $GITHUB_ENV
          # Download iOS platform (needed for storyboard compilation)
          xcodebuild -downloadPlatform iOS || true
          # If download fails, try to install via xcode-select
          xcrun simctl list 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup certificates
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          if [ -z "$P12_BASE64" ]; then echo "::error::P12_BASE64 secret is empty!"; exit 1; fi
          echo "$P12_BASE64" | base64 --decode > cert.p12
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > cert.mobileprovision
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i cert.mobileprovision | grep -A1 UUID | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          cp cert.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV

      - name: Prebuild iOS
        env:
          RCT_NEW_ARCH_ENABLED: "0"
        run: npx expo prebuild --platform ios --clean

      - name: Cache CocoaPods specs
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-specs-${{ runner.os }}

      - name: Install CocoaPods
        env:
          RCT_NEW_ARCH_ENABLED: "0"
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Create folly coro stubs
        run: |
          cd ios
          chmod -R u+w Pods/ 2>/dev/null || true
          python3 << 'EOF'
          import os

          # Stub content with proper folly::coro namespace
          stub = """#pragma once
          #define FOLLY_HAS_COROUTINES 0
          #define FOLLY_CFG_NO_COROUTINES 1
          namespace folly { namespace coro {
          template <typename T = void> struct coroutine_handle {
            static coroutine_handle from_address(void*) noexcept { return {}; }
            void* address() const noexcept { return nullptr; }
          };
          template <typename Promise = void> using coroutine_handle_t = coroutine_handle<Promise>;
          struct suspend_always { bool await_ready() const noexcept { return false; } template<typename T> void await_suspend(T) const noexcept {} void await_resume() const noexcept {} };
          struct suspend_never { bool await_ready() const noexcept { return true; } template<typename T> void await_suspend(T) const noexcept {} void await_resume() const noexcept {} };
          }} // namespace folly::coro
          """

          # Find all places where Coroutine.h should exist
          for root, dirs, files in os.walk("Pods"):
              if "folly" in root and root.endswith("folly"):
                  coro_dir = os.path.join(root, "coro")
                  os.makedirs(coro_dir, exist_ok=True)
                  path = os.path.join(coro_dir, "Coroutine.h")
                  if not os.path.exists(path) or os.path.getsize(path) < 100:
                      with open(path, "w") as f:
                          f.write(stub)
                      print(f"Created: {path}")

          # Also find Header directories
          for root, dirs, files in os.walk("Pods/Headers"):
              if root.endswith("RCT-Folly/folly"):
                  coro_dir = os.path.join(root, "coro")
                  os.makedirs(coro_dir, exist_ok=True)
                  path = os.path.join(coro_dir, "Coroutine.h")
                  with open(path, "w") as f:
                      f.write(stub)
                  print(f"Created: {path}")
          EOF

      - name: Build IPA
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          # Auto-detect scheme name from workspace
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          if [ -z "$SCHEME" ]; then
            SCHEME="revax"
          fi
          echo "Building $SCHEME with SDK $IOS_SDK"
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>FWU2HH6A9H</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.spinach2659.onion7191</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -sdk "$IOS_SDK" \
            CODE_SIGN_STYLE=Manual \
            "PROVISIONING_PROFILE=${PROFILE_UUID}" \
            "PROVISIONING_PROFILE_SPECIFIER=" \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            DEVELOPMENT_TEAM=FWU2HH6A9H \
            "GCC_PREPROCESSOR_DEFINITIONS=\$(inherited) FOLLY_HAS_COROUTINES=0 FOLLY_CFG_NO_COROUTINES=1" \
            IPHONEOS_DEPLOYMENT_TARGET=15.1 \
            -allowProvisioningUpdates
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VibeVax-iOS
          path: ios/build/output/*.ipa
          retention-days: 30
