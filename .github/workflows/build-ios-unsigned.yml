name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          IOS_SDK=$(xcodebuild -showsdks | grep "iphoneos" | head -1 | awk '{print $NF}')
          echo "IOS_SDK=$IOS_SDK" >> $GITHUB_ENV
          xcodebuild -downloadPlatform iOS || true
          xcrun simctl list 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild iOS
        env:
          RCT_NEW_ARCH_ENABLED: "0"
        run: npx expo prebuild --platform ios --clean

      - name: Fix iOS build errors (bridging header & duplicate methods)
        run: |
          cd ios
          APP_NAME=$(ls -d *.xcworkspace 2>/dev/null | head -1 | sed 's/.xcworkspace//')
          if [ -z "$APP_NAME" ]; then
            APP_NAME=$(ls -d */ | grep -v Pods | head -1 | sed 's/\///')
          fi
          echo "App name: $APP_NAME"
          BRIDGING_HEADER="${APP_NAME}/${APP_NAME}-Bridging-Header.h"
          if [ -f "$BRIDGING_HEADER" ]; then
            if grep -q "\-Swift\.h" "$BRIDGING_HEADER"; then
              echo "Removing -Swift.h import from bridging header"
              sed -i '' '/-Swift\.h/d' "$BRIDGING_HEADER"
            fi
          fi
          APP_DELEGATE="${APP_NAME}/AppDelegate.mm"
          if [ -f "$APP_DELEGATE" ]; then
            COUNT=$(grep -c "didRegisterForRemoteNotificationsWithDeviceToken" "$APP_DELEGATE" 2>/dev/null || echo "0")
            if [ "$COUNT" -gt "1" ]; then
              echo "Found $COUNT notification methods, removing duplicates via python"
              python3 - "$APP_DELEGATE" <<'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path, 'r') as f:
              content = f.read()
          pattern = r'(-\s*\(void\)\s*application:.*?didRegisterForRemoteNotificationsWithDeviceToken:.*?\{.*?\})'
          matches = list(re.finditer(pattern, content, re.DOTALL))
          if len(matches) > 1:
              for m in reversed(matches[1:]):
                  content = content[:m.start()] + content[m.end():]
              with open(path, 'w') as f:
                  f.write(content)
              print(f'Removed {len(matches)-1} duplicate method(s)')
          PYEOF
            fi
          fi
          if [ -f "$APP_DELEGATE" ] && grep -q "didRegisterForRemoteNotificationsWithDeviceToken" "$APP_DELEGATE"; then
            for swift_file in ${APP_NAME}/*.swift; do
              [ -f "$swift_file" ] || continue
              if grep -q "didRegisterForRemoteNotificationsWithDeviceToken" "$swift_file"; then
                echo "Removing conflicting notification method from $swift_file"
                python3 - "$swift_file" <<'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path, 'r') as f:
              content = f.read()
          content = re.sub(r'\s*(?:@objc\s+)?(?:override\s+)?func\s+application\s*\([^)]*didRegisterForRemoteNotificationsWithDeviceToken[^)]*\)\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          with open(path, 'w') as f:
              f.write(content)
          PYEOF
              fi
            done
          fi

      - name: Cache CocoaPods specs
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-specs-${{ runner.os }}

      - name: Install CocoaPods
        env:
          RCT_NEW_ARCH_ENABLED: "0"
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Create folly coro stubs
        run: |
          cd ios
          chmod -R u+w Pods/ 2>/dev/null || true
          python3 << 'EOF'
          import os

          stub = """#pragma once
          #define FOLLY_HAS_COROUTINES 0
          #define FOLLY_CFG_NO_COROUTINES 1
          namespace folly { namespace coro {
          template <typename T = void> struct coroutine_handle {
            static coroutine_handle from_address(void*) noexcept { return {}; }
            void* address() const noexcept { return nullptr; }
          };
          template <typename Promise = void> using coroutine_handle_t = coroutine_handle<Promise>;
          struct suspend_always { bool await_ready() const noexcept { return false; } template<typename T> void await_suspend(T) const noexcept {} void await_resume() const noexcept {} };
          struct suspend_never { bool await_ready() const noexcept { return true; } template<typename T> void await_suspend(T) const noexcept {} void await_resume() const noexcept {} };
          }} // namespace folly::coro
          """

          for root, dirs, files in os.walk("Pods"):
              if "folly" in root and root.endswith("folly"):
                  coro_dir = os.path.join(root, "coro")
                  os.makedirs(coro_dir, exist_ok=True)
                  path = os.path.join(coro_dir, "Coroutine.h")
                  if not os.path.exists(path) or os.path.getsize(path) < 100:
                      with open(path, "w") as f:
                          f.write(stub)
                      print(f"Created: {path}")

          for root, dirs, files in os.walk("Pods/Headers"):
              if root.endswith("RCT-Folly/folly"):
                  coro_dir = os.path.join(root, "coro")
                  os.makedirs(coro_dir, exist_ok=True)
                  path = os.path.join(coro_dir, "Coroutine.h")
                  with open(path, "w") as f:
                      f.write(stub)
                  print(f"Created: {path}")
          EOF

      - name: Build unsigned archive
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          echo "Available schemes:"
          xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | grep -v "Schemes:"
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Using scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            -sdk "$IOS_SDK" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            SKIP_INSTALL=NO \
            "GCC_PREPROCESSOR_DEFINITIONS=\$(inherited) FOLLY_HAS_COROUTINES=0 FOLLY_CFG_NO_COROUTINES=1" \
            IPHONEOS_DEPLOYMENT_TARGET=15.1

      - name: Create unsigned IPA
        run: |
          cd ios
          APP_PATH=$(find build/App.xcarchive -name "*.app" -type d | grep -v "\.dSYM" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d | grep -v "\.dSYM" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found. Full archive contents:"
            find build/App.xcarchive -type f -o -type d | head -50
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          mkdir -p build/output
          cd build && zip -r output/VibeVax-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: VibeVax-iOS-unsigned
          path: ios/build/output/VibeVax-unsigned.ipa
          retention-days: 90
